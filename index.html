<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./scripts.js" defer></script>
     <link rel="stylesheet" href="styles.css">
</head>

<body>

     <div id="display-player">
        <p id="display-name1" class="player1">Player1</p>
        <button command="show-modal" commandfor="playerName" id="btn-name1">
            Change name
        </button>

        <p id="display-name2" class="player2">Player2</p>
        <button command="show-modal" commandfor="playerName" id="btn-name2">
            Change name
        </button>

        <dialog id="playerName">
            <label for="name">New name :</label>
            <input type="text" id="name"> 
            <button type="submit" id="change-btn">Change</button>
            <button commandfor="playerName" command="close">Close</button>
        </dialog>

     </div>
    
    <div class="gameState">
        <p class="display-score"></p>
        <p class="display-turn"></p>
    </div>
    <div class="gameBoard">
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
    </div>
    
    <div id="btns">
        <button id="start-btn">
            Start
        </button>
        <button id="restart-btn">
            Restart
        </button>
    </div>


</body>
</html>
